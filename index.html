<script>
(function(){
  var BUILD = "v26-supabase-sync-20260605";
  try {
    var current = localStorage.getItem("convoca_build_version");
    if (current !== BUILD) {
      localStorage.setItem("convoca_build_version", BUILD);
      if ("caches" in window) {
        caches.keys().then(function(keys) {
          return Promise.all(keys.map(function(k) { return caches.delete(k); }));
        }).finally(function(){
          if ("serviceWorker" in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              return Promise.all(regs.map(function(r) { return r.unregister(); }));
            }).finally(function() {
              setTimeout(function() { window.location.reload(); }, 250);
            });
          } else {
            setTimeout(function() { window.location.reload(); }, 250);
          }
        });
      }
    }
  } catch(e) {}
})();
</script>


<script>
(function(){
  try {
    var params = new URLSearchParams(location.search);
    if (params.has("resetassets")) {
      if ("caches" in window) {
        caches.keys().then(function(keys) {
          return Promise.all(keys.map(function(k) { return caches.delete(k); }));
        }).finally(function(){
          if ("serviceWorker" in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              return Promise.all(regs.map(function(r) { return r.unregister(); }));
            }).finally(function() {
              location.replace(location.pathname + "?v=25");
            });
          } else {
            location.replace(location.pathname + "?v=25");
          }
        });
      }
    }
  } catch(e) {}
})();
</script>

</head>

    </div>

      <span id="modeBadge" class="badge">Modalità giocatore</span>
      <button id="loginBtn" class="btn secondary">Accedi staff</button>
      <button id="logoutBtn" class="btn secondary hidden">Esci staff</button>
    </div>
  </header>

  <nav class="nav" id="mainNav">
    <button data-view="dashboard" class="active">Home</button>

    <button data-view="matches" class="staff-only">Partite</button>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('/service-worker.js').catch(function (err) {
      console.warn('Service worker non registrato:', err);
    });
